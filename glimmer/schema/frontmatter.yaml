# Glimmer Schema v0.2.0 — Front-Matter Field Definitions
#
# This file is the machine-readable contract for what fields each entity type
# must, may, and may not have in its sidecar front-matter. Validators consume
# this file directly; the human-readable spec is in `schema.md`.
#
# Format: YAML, intentionally simple. Each entity type is a top-level key.
# Under each type:
#   required:        — fields that MUST be present
#   optional:        — fields that MAY be present
#   edges-allowed:   — edge types whose target is permitted from this node type
#   body-required:   — whether the markdown body after the front-matter is required
#
# v0.3: added `experiment` (task/acquisition paradigm), `concept` (research
# question / hypothesis as a first-class node), + `contributed-by` universal edge.
# v0.2 changes from v0.1: dropped `qc-artifact` and `rater` (over-indexed on QC
# as the canonical example). Added `finding` between `derivative` and `publication`
# per the EVI Evidence Graph Ontology. Agent identity is now a string field on
# `finding` and `derivative` (`produced-by-agent`), not a separate node type.

schema-version: "0.3.0"

# ─────────────────────────────────────────────────────────────────────────────
# common fields — every Glimmer node has these
# ─────────────────────────────────────────────────────────────────────────────
_common:
  required:
    id:                string                   # kebab-case, unique within dataset
    type:              <enum:{dataset,method,experiment,derivative,finding,concept,standard,publication}>
    name:              string                   # human-readable
    created:           datetime                 # ISO 8601, UTC preferred
    modified:          datetime                 # ISO 8601, UTC preferred
  optional:
    provenance-hash:   sha256                   # SHA-256 of body content; auto-computed
    description:       string                   # short free-text agent-readable summary
    edges:             edges-list               # outgoing edges; see edges-allowed per type

# ─────────────────────────────────────────────────────────────────────────────
# universal edges — allowed from ANY node type (validator unions these in)
# ─────────────────────────────────────────────────────────────────────────────
_universal-edges:
  - contributed-by     # → contributor id (ORCID URI / email / kebab); OUT-OF-GRAPH target.
                       #   role + identity carried as edge metadata, e.g.:
                       #   {type: contributed-by, target: "0000-0002-1825-0097", role: pi, name: "A VanMeter"}

# ─────────────────────────────────────────────────────────────────────────────
# dataset — BIDS-conformant data (subject, session, scan, or aggregate)
# ─────────────────────────────────────────────────────────────────────────────
dataset:
  inherits: _common
  required:
    subject-id:        string                   # the participant identifier
  optional:
    session:           string                   # optional session label
    modality:          <enum:{anat-T1w,anat-T2w,bold,dwi,asl,meg,eeg,multi}>
    acquisition-date:  datetime
    scanner:           string                   # e.g., "Siemens 3T TimTrio"
    metrics:           map                      # tool-extracted QC metrics (optional)
    bids-version:      string                   # e.g., "1.11.1"
    # DataLad coordinates — required for re-fetch guarantees
    datalad-superdataset: string                # URL of the superdataset
    datalad-relative-path: string               # path within the superdataset
    datalad-commit-sha: string                  # pinned commit of the containing sub-dataset
    datalad-annex-key: string                   # git-annex content hash, for single files
  edges-allowed:
    - produced-by      # → method (acquisition method)
    - derives-from     # → dataset (parent or source)
    - conforms-to      # → standard
    - cited-in         # → publication
  body-required: false

# ─────────────────────────────────────────────────────────────────────────────
# method — a named analysis or pipeline (Nipype Workflow, Interface, Node)
# ─────────────────────────────────────────────────────────────────────────────
method:
  inherits: _common
  required:
    tool:              string                   # e.g., "fsl.BET", "nipype-workflow"
    version:           string                   # e.g., "fsl-6.0.5"
  optional:
    parameters:        map                      # invocation parameters
    parameters-hash:   sha256                   # hash over the parameter manifest
    container-image:   string                   # e.g., "nipreps/fmriprep:23.0.2"
    container-digest:  string                   # sha256 of the container image
    workflow-definition-sha: string             # git SHA of the workflow source file
    nipype-node-type:  <enum:{Interface,Node,MapNode,Workflow,JoinNode}>
  edges-allowed:
    - applies-to         # → dataset
    - produces           # → derivative
    - validates-against  # → publication
    - requires-standard  # → standard
    - composes           # → method (sub-methods for workflows)
  body-required: true

# ─────────────────────────────────────────────────────────────────────────────
# derivative — output of applying a method to a dataset
# ─────────────────────────────────────────────────────────────────────────────
derivative:
  inherits: _common
  required:
    output-kind:       <enum:{volume,surface,timeseries,statistical-map,table,figure,other}>
    provenance-mode:   <enum:{deterministic,agent-inferred,stochastic}>
  optional:
    output-path:       string                   # relative path on disk
    output-format:     string                   # e.g., "nifti", "gifti", "csv"
    output-hash:       sha256                   # hash of the output file(s) — load-bearing for verification
    produced-by-agent: string                   # for agent-inferred outputs; the model id + version
    # DataLad coordinates
    datalad-relative-path: string
    datalad-commit-sha: string
    datalad-annex-key: string
  edges-allowed:
    - produced-by       # → method
    - derives-from      # → dataset or derivative
    - cited-in          # → publication
    - supports-finding  # → finding
  body-required: false

# ─────────────────────────────────────────────────────────────────────────────
# finding — interpreted assertion grounded in derivatives (between derivative
# and publication). EVI-aligned: a finding has interpretation text + evidence
# pointers + verifiable provenance. Multiple findings aggregate into a
# publication.
# ─────────────────────────────────────────────────────────────────────────────
finding:
  inherits: _common
  required:
    interpretation:    string                   # human-readable assertion ("subject's brain volume is X mm³")
    based-on:          [list-of-node-ids]       # derivative or dataset nodes supporting the claim
  optional:
    confidence:        <enum:{high,medium,low}> # or numeric/CI
    produced-by-agent: string                   # model id + version OR human persona name
    reasoning-trace:                            # REQUIRED when produced by an agent
      nodes-accessed:   [list-of-strings]
      metrics-cited:    map                     # {metric-name: rationale}
      evidence-summary: string
      model-identifier: string
      timestamp:        datetime
    challenged-by:     [list-of-node-ids]       # findings or publications that contradict
    supports:          [list-of-node-ids]       # findings or publications this reinforces
  edges-allowed:
    - based-on            # → derivative or dataset
    - addresses-concept   # → concept
    - cited-in            # → publication
    - challenged-by       # → finding or publication
    - supports            # → finding or publication
  body-required: false

# ─────────────────────────────────────────────────────────────────────────────
# experiment — a task / acquisition PARADIGM (the active experimental design)
# distinct from `standard` (a static spec): an experiment has conditions, timing,
# regressors. e.g. an event-related emotional-film design, a reward task, rest.
# ─────────────────────────────────────────────────────────────────────────────
experiment:
  inherits: _common
  required:
    task-name:         string                   # e.g., "emoFilm", "wof", "rest"
  optional:
    design:            <enum:{event-related,block,resting-state,naturalistic,mixed}>
    conditions:        [list-of-strings]         # e.g., [REST, NEU, POS, NEG]
    regressors:        [list-of-strings]         # modeled regressors (e.g., salience-SRF convolved w/ HRF)
    timing-source:     string                    # path/ref to the timing file (onsets/durations)
    stimulus-set:      string                    # ref to the stimuli (e.g., the film clips)
    duration-sec:      number
    n-trials:          int
  edges-allowed:
    - realized-by        # → dataset (the data acquired under this paradigm)
    - analyzed-by        # → method
    - tests-hypothesis   # → concept (the paradigm is designed to test this hypothesis)
    - conforms-to        # → standard
    - cited-in           # → publication
  body-required: true

# ─────────────────────────────────────────────────────────────────────────────
# concept — a research question, hypothesis, or theme as a first-class node.
# The unit a research program operates at: what a grant funds, what a thesis
# defends, what a meta-analysis examines. Findings and publications point at it
# via `addresses-concept`; the agentic loop decomposes a question into sub-
# hypotheses via `decomposes-into`. See docs/agentic-loop.md.
# ─────────────────────────────────────────────────────────────────────────────
concept:
  inherits: _common
  required:
    statement:         string                   # the question / hypothesis / theme, as a sentence
  optional:
    concept-kind:      <enum:{research-question,hypothesis,theme,construct}>
    status:            <enum:{open,under-investigation,supported,refuted,superseded}>
    falsifiable:       bool                      # true when stated as a testable claim
  edges-allowed:
    - decomposes-into   # → concept (a question decomposed into sub-hypotheses)
    - extends-concept   # → concept (specialization / theory inheritance)
    - subsumed-by       # → concept (becomes a special case of a broader concept)
    - competes-with     # → concept (rival hypothesis)
    - superseded-by     # → concept (a refined replacement supersedes this one)
    - supports          # → finding, publication, or concept (reinforcing evidence)
    - contradicts       # → finding, publication, or concept (contradictory evidence)
    - cited-in          # → publication
  body-required: true

# ─────────────────────────────────────────────────────────────────────────────
# standard — a spec, atlas, template, protocol
# ─────────────────────────────────────────────────────────────────────────────
standard:
  inherits: _common
  required:
    standard-class:    <enum:{spec,atlas,template,protocol,other}>
  optional:
    version:           string
    upstream-url:      string
  edges-allowed:
    - defines           # → standard (sub-standards)
    - versions          # → standard (relates versions)
  body-required: true

# ─────────────────────────────────────────────────────────────────────────────
# publication — paper draft, abstract, preprint
# ─────────────────────────────────────────────────────────────────────────────
publication:
  inherits: _common
  required:
    pub-status:        <enum:{draft,submitted,accepted,published,abstract,preprint}>
  optional:
    venue:             string
    doi:               string
    year:              int
    title:             string
    authors:           [list-of-strings]
  edges-allowed:
    - cites-dataset
    - cites-method
    - cites-derivative
    - cites-finding
    - cites             # generic citation
    - aggregates        # → finding (this paper aggregates these findings)
    - addresses-concept # → concept (the publication's claim is about this concept)
  body-required: false

# ─────────────────────────────────────────────────────────────────────────────
# index file — required at the dataset root
# ─────────────────────────────────────────────────────────────────────────────
_glimmer-index:
  filename: "_glimmer-index.json"
  required:
    schema:            string                   # e.g., "glimmer/v0.2.0"
    dataset-name:      string
    node-count:        int
    nodes:             [list-of-nodes]
  optional:
    created:           datetime
    description:       string
    upstream-graph:    string

# ─────────────────────────────────────────────────────────────────────────────
# validator hints
# ─────────────────────────────────────────────────────────────────────────────
_validator-hints:
  warn-if:
    - "dataset node has no `datalad-commit-sha`"
    - "derivative node has no `output-hash`"
    - "finding node has no `based-on` edge or empty list"
    - "method node has no `version` field"
    - "publication node has no `cites-*` edges"
  error-if:
    - "node `id` is not kebab-case"
    - "node `id` is not unique within the dataset"
    - "edge target does not exist in the index"
    - "edge type is not in the allowed list for the source node's type"
    - "required field is missing"
    - "finding produced-by-agent is set but reasoning-trace is missing"
